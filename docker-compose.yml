services:
  postgres:
    image: postgres:15
    container_name: outdoor_postgres
    restart: always
    environment:
      POSTGRES_USER: outdoor
      POSTGRES_PASSWORD: outdoor
      POSTGRES_DB: outdoor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: outdoor_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
