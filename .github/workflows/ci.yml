name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outdoor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d outdoor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/outdoor
      REDIS_URL: redis://127.0.0.1:6379
      PORT: 3000
      JWT_SECRET: test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build --if-present

      - name: Start app
        run: |
          npx tsx src/main.ts > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for health readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health/ready; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done

          echo "App failed readiness check"
          cat app.log
          exit 1

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
